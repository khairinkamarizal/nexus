<!-- Header Component -->
<header class="sticky top-0 z-50 w-full border-b border-trustori-slate20 dark:border-trustori-slate80 bg-white/95 dark:bg-[#0E0F10]/95 backdrop-blur supports-[backdrop-filter]:bg-white/60 dark:supports-[backdrop-filter]:bg-[#0E0F10]/60 transition-colors duration-300">
    <div class="container px-4 md:px-8 flex h-14 items-center max-w-screen-2xl mx-auto">
        <button id="mobile-menu-btn" class="inline-flex items-center justify-center rounded-md p-2 text-trustori-slate60 dark:text-trustori-slate40 hover:bg-trustori-slate10 dark:hover:bg-trustori-slate80 hover:text-trustori-slate90 dark:hover:text-white md:hidden mr-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <line x1="4" x2="20" y1="12" y2="12"></line>
                <line x1="4" x2="20" y1="6" y2="6"></line>
                <line x1="4" x2="20" y1="18" y2="18"></line>
            </svg>
        </button>

        <div class="mr-4 hidden md:flex">
            <a class="mr-6 flex items-center space-x-2 group" href="#">
                <div class="relative h-6">
                    <img src="assets/nexus_logo.svg" alt="Trustori Nexus" class="h-6 w-auto">
                </div>
            </a>
            <nav class="flex items-center space-x-6 text-sm font-medium">
                <a href="index.html" class="transition-colors hover:text-trustori-slate90/80 dark:hover:text-blue-400" data-nav="components">Components</a>
                <a href="identity.html" class="transition-colors hover:text-trustori-slate90/80 dark:hover:text-blue-400" data-nav="brand">Brand</a>
            </nav>
        </div>

        <div class="flex md:hidden mr-auto">
            <img src="assets/nexus_logo.svg" alt="Trustori Nexus" class="h-6 w-auto">
        </div>

        <div class="flex flex-1 items-center justify-end space-x-2">
             <!-- Theme Toggle -->
             <button id="theme-toggle" class="inline-flex items-center justify-center rounded-md p-2 text-trustori-slate60 dark:text-trustori-slate40 hover:bg-trustori-slate10 dark:hover:bg-trustori-slate80 transition-colors">
                <!-- Sun Icon -->
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <!-- Moon Icon -->
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>

        </div>
    </div>
</header>

<script>
// Header component initialization
(function() {
    // Set active navigation based on current page
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    const navLinks = document.querySelectorAll('header nav a[data-nav]');
    
    navLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href === currentPage) {
            link.classList.add('text-trustori-slate90', 'dark:text-white');
            link.classList.remove('text-trustori-slate60', 'dark:text-trustori-slate40');
        } else {
            link.classList.add('text-trustori-slate60', 'dark:text-trustori-slate40');
            link.classList.remove('text-trustori-slate90', 'dark:text-white');
        }
    });
})();
</script>
